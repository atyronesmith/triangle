<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a18"/>
      <stop offset="100%" stop-color="#242422"/>
    </linearGradient>
    <!-- Triangle edge gradients -->
    <linearGradient id="g1" x1="256" y1="80" x2="420" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="g2" x1="420" y1="400" x2="92" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#378ADD"/>
      <stop offset="100%" stop-color="#2B7DE9"/>
    </linearGradient>
    <linearGradient id="g3" x1="92" y1="400" x2="256" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <!-- AI glow -->
    <radialGradient id="glow" cx="256" cy="280" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
    <!-- Circuit pattern -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#333" stroke-width="0.5" opacity="0.3">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- AI glow behind triangle -->
  <circle cx="256" cy="280" r="120" fill="url(#glow)"/>

  <!-- Outer triangle (baseline - green) -->
  <polygon points="256,80 420,400 92,400" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.3"/>
  <polygon points="256,80 420,400 92,400" fill="#5DCAA5" fill-opacity="0.06"/>

  <!-- Middle triangle (AI frontier - blue, slightly larger) -->
  <polygon points="256,60 440,410 72,410" fill="none" stroke="#378ADD" stroke-width="2.5" opacity="0.5" stroke-dasharray="12 6"/>

  <!-- Inner triangle (actual - red, slightly smaller) -->
  <polygon points="256,110 400,390 112,390" fill="none" stroke="#E24B4A" stroke-width="2.5" opacity="0.6"/>
  <polygon points="256,110 400,390 112,390" fill="#E24B4A" fill-opacity="0.04"/>

  <!-- Main triangle edges (thick, colored) -->
  <line x1="256" y1="80" x2="420" y2="400" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>
  <line x1="420" y1="400" x2="92" y2="400" stroke="url(#g2)" stroke-width="5" stroke-linecap="round"/>
  <line x1="92" y1="400" x2="256" y2="80" stroke="url(#g3)" stroke-width="5" stroke-linecap="round"/>

  <!-- Vertex dots -->
  <circle cx="256" cy="80" r="8" fill="#5DCAA5"/>
  <circle cx="420" cy="400" r="8" fill="#378ADD"/>
  <circle cx="92" cy="400" r="8" fill="#EF9F27"/>

  <!-- Vertex labels -->
  <text x="256" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#5DCAA5" letter-spacing="2">SCOPE</text>
  <text x="455" y="420" text-anchor="start" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#378ADD" letter-spacing="2">COST</text>
  <text x="57" y="420" text-anchor="end" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#EF9F27" letter-spacing="2">TIME</text>

  <!-- Center: Quality + AI circuit -->
  <circle cx="256" cy="280" r="40" fill="none" stroke="#7F77DD" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="280" r="28" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.3"/>

  <!-- AI circuit lines radiating from center -->
  <g stroke="#7F77DD" stroke-width="1.5" opacity="0.5">
    <!-- Up to scope -->
    <line x1="256" y1="240" x2="256" y2="160"/>
    <circle cx="256" cy="160" r="3" fill="#7F77DD"/>
    <!-- Down-right to cost -->
    <line x1="284" y1="296" x2="340" y2="350"/>
    <circle cx="340" cy="350" r="3" fill="#7F77DD"/>
    <!-- Down-left to time -->
    <line x1="228" y1="296" x2="172" y2="350"/>
    <circle cx="172" cy="350" r="3" fill="#7F77DD"/>
  </g>

  <!-- Center text -->
  <text x="256" y="274" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#9c9a92">QUALITY</text>
  <text x="256" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#7F77DD">AI</text>

  <!-- Bottom tagline -->
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#73726c" letter-spacing="3">IRON TRIANGLE SIMULATOR</text>
</svg>
