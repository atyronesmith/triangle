<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a18"/>
      <stop offset="100%" stop-color="#2a2a28"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="260" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#7F77DD" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-sc" x1="256" y1="72" x2="440" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#378ADD"/>
    </linearGradient>
    <linearGradient id="edge-ct" x1="440" y1="400" x2="72" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#378ADD"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="edge-ts" x1="72" y1="400" x2="256" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="256" cy="260" r="160" fill="url(#glow)"/>

  <!-- Ghost triangles -->
  <polygon points="256,52 460,420 52,420" fill="none" stroke="#378ADD" stroke-width="1.5" opacity="0.15"/>
  <polygon points="256,100 410,390 102,390" fill="none" stroke="#E24B4A" stroke-width="1.5" opacity="0.2"/>

  <!-- Main triangle fill -->
  <polygon points="256,72 440,400 72,400" fill="#5DCAA5" fill-opacity="0.05"/>

  <!-- Main triangle edges -->
  <line x1="256" y1="72" x2="440" y2="400" stroke="url(#edge-sc)" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="400" x2="72" y2="400" stroke="url(#edge-ct)" stroke-width="6" stroke-linecap="round"/>
  <line x1="72" y1="400" x2="256" y2="72" stroke="url(#edge-ts)" stroke-width="6" stroke-linecap="round"/>

  <!-- Scope vertex: crosshair/target icon -->
  <g transform="translate(256, 52)">
    <circle r="22" fill="#1a1a18" stroke="#5DCAA5" stroke-width="2.5"/>
    <circle r="12" fill="none" stroke="#5DCAA5" stroke-width="1.5" opacity="0.6"/>
    <circle r="4" fill="#5DCAA5"/>
    <line x1="0" y1="-18" x2="0" y2="-8" stroke="#5DCAA5" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="18" stroke="#5DCAA5" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="-8" y2="0" stroke="#5DCAA5" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="18" y2="0" stroke="#5DCAA5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Cost vertex: dollar sign -->
  <g transform="translate(452, 412)">
    <circle r="22" fill="#1a1a18" stroke="#378ADD" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#378ADD">$</text>
  </g>

  <!-- Time vertex: clock -->
  <g transform="translate(60, 412)">
    <circle r="22" fill="#1a1a18" stroke="#F5A623" stroke-width="2.5"/>
    <circle r="14" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0.5"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="7" y2="3" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
    <circle r="2" fill="#F5A623"/>
    <!-- Hour marks -->
    <circle cx="0" cy="-12" r="1" fill="#F5A623" opacity="0.6"/>
    <circle cx="12" cy="0" r="1" fill="#F5A623" opacity="0.6"/>
    <circle cx="0" cy="12" r="1" fill="#F5A623" opacity="0.6"/>
    <circle cx="-12" cy="0" r="1" fill="#F5A623" opacity="0.6"/>
  </g>

  <!-- Center: AI circuit node -->
  <circle cx="256" cy="260" r="32" fill="#1a1a18" stroke="#7F77DD" stroke-width="2.5"/>
  <circle cx="256" cy="260" r="18" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.4"/>
  <text x="256" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#7F77DD">AI</text>

  <!-- Circuit lines from center to vertices -->
  <g stroke="#7F77DD" stroke-width="1.5" opacity="0.35" stroke-dasharray="6 4">
    <line x1="256" y1="228" x2="256" y2="95"/>
    <line x1="280" y1="278" x2="430" y2="395"/>
    <line x1="232" y1="278" x2="82" y2="395"/>
  </g>

  <!-- Circuit junction dots -->
  <circle cx="256" cy="155" r="3" fill="#7F77DD" opacity="0.5"/>
  <circle cx="360" cy="340" r="3" fill="#7F77DD" opacity="0.5"/>
  <circle cx="152" cy="340" r="3" fill="#7F77DD" opacity="0.5"/>
</svg>
